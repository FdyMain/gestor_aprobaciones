name: Robot BPM — Aprobación Comunicaciones

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  schedule:
    - cron: '30 15 * * 1-5'   # 10:30 AM hora Colombia (COT = UTC-5), lunes a viernes
    - cron: '0 23 * * 1-5'    # 06:00 PM hora Colombia (COT = UTC-5), lunes a viernes

  workflow_dispatch:
    inputs:
      headless:
        description: 'Modo de ejecución del navegador'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  robot-bpm:
    name: Ejecutar Robot BPM
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      # ─────────────────────────────────────────
      # 1. Código fuente
      # ─────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Entorno Java 17 con caché de Maven
      # ─────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ─────────────────────────────────────────
      # 3. Resolver dependencias y compilar
      # ─────────────────────────────────────────
      - name: Compilar y resolver dependencias
        run: mvn -B test-compile -q

      # ─────────────────────────────────────────
      # 4. Instalar Chromium + dependencias del SO
      # ─────────────────────────────────────────
      - name: Instalar Chromium y dependencias del sistema
        run: mvn -B exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium --with-deps"

      # ─────────────────────────────────────────
      # 5. Ejecutar el robot
      # ─────────────────────────────────────────
      - name: Ejecutar Robot
        run: mvn -B test -Dheadless=${{ inputs.headless || 'true' }} -Dfile.encoding=UTF-8
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          APP_LOGIN_URL:      ${{ secrets.APP_LOGIN_URL }}
          APP_USERNAME:       ${{ secrets.APP_USERNAME }}
          APP_PASSWORD:       ${{ secrets.APP_PASSWORD }}
          WA_ACCESS_TOKEN:    ${{ secrets.WA_ACCESS_TOKEN }}
          WA_PHONE_NUMBER_ID: ${{ secrets.WA_PHONE_NUMBER_ID }}
          WA_TO_NUMBER:       ${{ secrets.WA_TO_NUMBER }}
          WA_API_URL:         ${{ secrets.WA_API_URL }}

      # ─────────────────────────────────────────
      # 6. Subir artefactos (siempre, incluso si falla)
      # ─────────────────────────────────────────
      - name: Subir evidencias (screenshots, videos, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-run-${{ github.run_number }}
          path: evidencias/
          if-no-files-found: ignore
          retention-days: 30

      - name: Subir reporte Excel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-excel-run-${{ github.run_number }}
          path: src/main/resources/resultados_aprobaciones.xlsx
          if-no-files-found: ignore
          retention-days: 30

      # ─────────────────────────────────────────
      # 7. Leer resultado.properties del robot
      # ─────────────────────────────────────────
      - name: Leer resultados del robot
        if: always()
        run: |
          if [ -f resultado.properties ]; then
            while IFS='=' read -r key value; do
              echo "ROBOT_${key^^}=${value}" >> $GITHUB_ENV
            done < resultado.properties
          else
            echo "ROBOT_ESTADO=SIN DATOS"   >> $GITHUB_ENV
            echo "ROBOT_APROBADAS=0"        >> $GITHUB_ENV
            echo "ROBOT_FALLIDAS=0"         >> $GITHUB_ENV
            echo "ROBOT_PROCESADAS=0"       >> $GITHUB_ENV
            echo "ROBOT_DURACION=N/A"       >> $GITHUB_ENV
            echo "ROBOT_FECHAINICIO=N/A"    >> $GITHUB_ENV
            echo "ROBOT_FECHAFIN=N/A"       >> $GITHUB_ENV
          fi

      # ─────────────────────────────────────────
      # 8. Generar email HTML con datos reales
      # ─────────────────────────────────────────
      - name: Generar email HTML
        if: always()
        run: |
          cp .github/email-template.html email-final.html
          sed -i "s|{{APROBADAS}}|${ROBOT_APROBADAS}|g"      email-final.html
          sed -i "s|{{FALLIDAS}}|${ROBOT_FALLIDAS}|g"        email-final.html
          sed -i "s|{{PROCESADAS}}|${ROBOT_PROCESADAS}|g"    email-final.html
          sed -i "s|{{DURACION}}|${ROBOT_DURACION}|g"        email-final.html
          sed -i "s|{{FECHA_INICIO}}|${ROBOT_FECHAINICIO}|g" email-final.html
          sed -i "s|{{FECHA_FIN}}|${ROBOT_FECHAFIN}|g"       email-final.html
          sed -i "s|{{ESTADO}}|${ROBOT_ESTADO}|g"            email-final.html
          COLOR=$([ "${ROBOT_ESTADO}" = "EXITOSO" ] && echo "#16a34a" || echo "#dc2626")
          sed -i "s|{{ESTADO_COLOR}}|${COLOR}|g"             email-final.html
          sed -i "s|{{RUN_NUMBER}}|${{ github.run_number }}|g" email-final.html
          sed -i "s|{{BRANCH}}|${{ github.ref_name }}|g"     email-final.html
          sed -i "s|{{COMMIT}}|${{ github.sha }}|g"          email-final.html
          sed -i "s|{{RUN_URL}}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|g" email-final.html

      # ─────────────────────────────────────────
      # 9. Enviar notificación por email
      # ─────────────────────────────────────────
      - name: Enviar notificación por email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Robot BPM #${{ github.run_number }} — ${{ env.ROBOT_ESTADO }}"
          to: "${{ secrets.MAIL_TO_1 }},${{ secrets.MAIL_TO_2 }}"
          from: Robot BPM <${{ secrets.MAIL_USERNAME }}>
          html_body: file://email-final.html
          ignore_cert: false
          convert_markdown: false

      # ─────────────────────────────────────────
      # 10. Resumen del job en la UI de Actions
      # ─────────────────────────────────────────
      - name: Resumen de ejecución
        if: always()
        run: |
          echo "## Robot BPM — Resultado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rama | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Headless | \`${{ inputs.headless || 'true' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Aprobadas | **${ROBOT_APROBADAS}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Fallidas | **${ROBOT_FALLIDAS}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Total procesadas | **${ROBOT_PROCESADAS}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Duración | ${ROBOT_DURACION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Estado | **${ROBOT_ESTADO}** |" >> $GITHUB_STEP_SUMMARY

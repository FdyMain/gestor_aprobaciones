name: Robot BPM — Aprobación Comunicaciones

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:
    inputs:
      headless:
        description: 'Modo de ejecución del navegador'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  robot-bpm:
    name: Ejecutar Robot BPM

    # 👇 ahora se ejecuta dentro de tu red
    runs-on: [self-hosted, linux]

    timeout-minutes: 60

    steps:

      # ─────────────────────────────────────────
      # 1. Código fuente
      # ─────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Configurar Java
      # ─────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ─────────────────────────────────────────
      # 3. Compilar proyecto
      # ─────────────────────────────────────────
      - name: Compilar dependencias
        run: mvn -B test-compile -q

      # ─────────────────────────────────────────
      # 4. Cache Playwright browsers
      # ─────────────────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # ─────────────────────────────────────────
      # 5. Instalar dependencias Linux
      # ─────────────────────────────────────────
      - name: Instalar dependencias Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwoff1 \
            libvpx9 \
            libevent-2.1-7 \
            libopus0 \
            libgstreamer-plugins-base1.0-0 \
            libgstreamer-gl1.0-0 \
            libgstreamer-plugins-bad1.0-0 \
            libflite1 \
            libavif16 \
            libharfbuzz-icu0 \
            libsecret-1-0 \
            libhyphen0 \
            libwayland-server0 \
            libmanette-0.2-0 \
            libgles2 \
            gstreamer1.0-libav

      # ─────────────────────────────────────────
      # 6. Instalar Chromium
      # ─────────────────────────────────────────
      - name: Instalar Playwright Chromium
        run: mvn -B exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

      # ─────────────────────────────────────────
      # 7. Probar conectividad a la aplicación
      # ─────────────────────────────────────────
      - name: Probar conectividad
        run: |
          echo "Probando acceso a la URL..."
          curl -I ${{ secrets.APP_LOGIN_URL }}

      # ─────────────────────────────────────────
      # 8. Ejecutar el robot
      # ─────────────────────────────────────────
      - name: Ejecutar Robot
        run: mvn -B test -Dheadless=${{ inputs.headless || 'true' }} -Dfile.encoding=UTF-8
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          APP_LOGIN_URL:      ${{ secrets.APP_LOGIN_URL }}
          APP_USERNAME:       ${{ secrets.APP_USERNAME }}
          APP_PASSWORD:       ${{ secrets.APP_PASSWORD }}
          WA_ACCESS_TOKEN:    ${{ secrets.WA_ACCESS_TOKEN }}
          WA_PHONE_NUMBER_ID: ${{ secrets.WA_PHONE_NUMBER_ID }}
          WA_TO_NUMBER:       ${{ secrets.WA_TO_NUMBER }}
          WA_API_URL:         ${{ secrets.WA_API_URL }}

      # ─────────────────────────────────────────
      # 9. Subir evidencias
      # ─────────────────────────────────────────
      - name: Subir evidencias
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-run-${{ github.run_number }}
          path: evidencias/
          if-no-files-found: ignore
          retention-days: 30

      - name: Subir reporte Excel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-excel-run-${{ github.run_number }}
          path: src/main/resources/resultados_aprobaciones.xlsx
          if-no-files-found: ignore
          retention-days: 30

      # ─────────────────────────────────────────
      # 10. Leer resultado.properties
      # ─────────────────────────────────────────
      - name: Leer resultados del robot
        if: always()
        run: |
          if [ -f resultado.properties ]; then
            while IFS='=' read -r key value; do
              echo "ROBOT_${key^^}=${value}" >> $GITHUB_ENV
            done < resultado.properties
          else
            echo "ROBOT_ESTADO=SIN DATOS"    >> $GITHUB_ENV
            echo "ROBOT_APROBADAS=0"         >> $GITHUB_ENV
            echo "ROBOT_REINTENTOS=0"        >> $GITHUB_ENV
            echo "ROBOT_PROCESADAS=0"        >> $GITHUB_ENV
            echo "ROBOT_DURACION=N/A"        >> $GITHUB_ENV
            echo "ROBOT_FECHAINICIO=N/A"     >> $GITHUB_ENV
            echo "ROBOT_FECHAFIN=N/A"        >> $GITHUB_ENV
            echo "ROBOT_OTROS_CODIGOS="      >> $GITHUB_ENV
          fi

      # ─────────────────────────────────────────
      # 11. Generar email HTML
      # ─────────────────────────────────────────
      - name: Generar email HTML
        if: always()
        run: |
          cp .github/email-template.html email-final.html
          sed -i "s|{{REINTENTOS}}|${ROBOT_REINTENTOS}|g"    email-final.html
          sed -i "s|{{PROCESADAS}}|${ROBOT_PROCESADAS}|g"    email-final.html
          sed -i "s|{{DURACION}}|${ROBOT_DURACION}|g"        email-final.html
          sed -i "s|{{FECHA_INICIO}}|${ROBOT_FECHAINICIO}|g" email-final.html
          sed -i "s|{{FECHA_FIN}}|${ROBOT_FECHAFIN}|g"       email-final.html
          sed -i "s|{{ESTADO}}|${ROBOT_ESTADO}|g"            email-final.html
          COLOR=$([ "${ROBOT_ESTADO}" = "EXITOSO" ] && echo "#16a34a" || echo "#dc2626")
          sed -i "s|{{ESTADO_COLOR}}|${COLOR}|g"             email-final.html
          sed -i "s|{{RUN_NUMBER}}|${{ github.run_number }}|g" email-final.html
          sed -i "s|{{BRANCH}}|${{ github.ref_name }}|g"     email-final.html
          sed -i "s|{{COMMIT}}|${{ github.sha }}|g"          email-final.html
          sed -i "s|{{RUN_URL}}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|g" email-final.html

          # Generar sección de otros códigos pendientes
          if [ -n "${ROBOT_OTROS_CODIGOS}" ]; then
            OTROS_HTML="<tr><td style=\"padding:24px 32px 0;\"><p style=\"margin:0 0 12px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;\">Otros c&#xF3;digos pendientes por revisar</p><table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"background-color:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;\"><tr style=\"background-color:#f1f5f9;\"><th style=\"padding:10px 20px;font-size:12px;color:#64748b;text-align:left;border-bottom:1px solid #e2e8f0;\">C&#xF3;digo</th><th style=\"padding:10px 20px;font-size:12px;color:#64748b;text-align:left;border-bottom:1px solid #e2e8f0;\">Cantidad</th></tr>"
            IFS=',' read -ra PARES <<< "${ROBOT_OTROS_CODIGOS}"
            for par in "${PARES[@]}"; do
              codigo="${par%%:*}"
              cantidad="${par##*:}"
              OTROS_HTML+="<tr><td style=\"padding:10px 20px;font-size:13px;color:#0f172a;border-bottom:1px solid #e2e8f0;\">${codigo}</td><td style=\"padding:10px 20px;font-size:13px;color:#0f172a;font-weight:600;border-bottom:1px solid #e2e8f0;\">${cantidad}</td></tr>"
            done
            OTROS_HTML+="</table></td></tr>"
            # Escapar para sed (reemplazar / por \/)
            OTROS_HTML_ESC=$(printf '%s\n' "$OTROS_HTML" | sed 's/[&/\]/\\&/g; s/$/\\n/' | tr -d '\n')
            sed -i "s|{{OTROS_CODIGOS_SECTION}}|${OTROS_HTML_ESC}|g" email-final.html
          else
            sed -i "s|{{OTROS_CODIGOS_SECTION}}||g" email-final.html
          fi

      # ─────────────────────────────────────────
      # 12. Enviar email
      # ─────────────────────────────────────────
      - name: Enviar notificación por email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Robot BPM #${{ github.run_number }} — ${{ env.ROBOT_ESTADO }}"
          to: "${{ secrets.MAIL_TO_1 }},${{ secrets.MAIL_TO_2 }}"
          from: Robot BPM <${{ secrets.MAIL_USERNAME }}>
          html_body: file://email-final.html
          ignore_cert: false
          convert_markdown: false